<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumpsum Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h2>Lumpsum Calculator</h2>
        
        <div class="input-group">
            <label for="principal">Investment Amount (₹)</label>
            <input type="text" id="principal" inputmode="numeric" placeholder="e.g. 1,00,000">
        </div>

        <div class="input-group">
            <label for="rate">Expected Returns (% per annum)</label>
            <input type="text" id="rate" inputmode="numeric" placeholder="e.g. 12">
        </div>

        <div class="input-group">
            <label for="years">Time Period (in Years)</label>
            <input type="text" id="years" inputmode="numeric" placeholder="e.g. 10">
        </div>

        <button onclick="calculateLumpsum()"><b>Calculate</b></button>

        <div class="results" id="results" style="display: none;">
            <div class="result-item">
                <span>Invested Amount:</span>
                <span id="invested">₹0</span>
            </div>
            <div class="result-item">
                <span>Estimated Returns:</span>
                <span id="returns">₹0</span>
            </div>
            <div class="result-item total">
                <span>Total Value:</span>
                <span id="total">₹0</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
